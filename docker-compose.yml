version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "30080:80"
    depends_on:
      - api-gateway

  api-gateway:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENVOICE_BASE_URL=http://openvoice:5000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - ollama
      - openvoice

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  openvoice:
    build: ./openvoice-server
    ports:
      - "5000:5000"

volumes:
  ollama-data:
