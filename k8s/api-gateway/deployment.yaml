apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: karatly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: karatly-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OPENVOICE_BASE_URL
              value: "http://openvoice:5000"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: karatly-secrets
                  key: gemini-api-key
                  optional: true
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
